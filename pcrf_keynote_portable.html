:root{
  --bg:#0A0E1A; --bgAlt:#121829; --ink:#EEF2FB; --inkDim:#9AA6C2;
  --accent:#5CE1D6; --accent2:#F5A524; --pcrf:#38BDF8; --pigrpo:#F59E42;
  --good:#4ADE80; --warn:#FBBF24; --grid:#24304A;
  --fh:'Space Grotesk',sans-serif; --fb:'Inter',sans-serif; --fm:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#05070d;color:var(--ink);font-family:var(--fb);overflow:hidden}
#stageWrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
#stage{position:relative;width:1280px;height:720px;background:var(--bg);overflow:hidden;
  box-shadow:0 30px 120px rgba(0,0,0,.6);transform-origin:center center}
#progress{position:absolute;top:0;left:0;height:3px;background:var(--accent);z-index:40;transition:width .3s ease}
.slide{position:absolute;inset:0;padding:64px 88px 80px;display:none;flex-direction:column;opacity:0;
  transition:opacity .35s ease}
.slide.active{display:flex;opacity:1}
.kicker{font-family:var(--fm);font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--inkDim);
  display:flex;align-items:center;gap:10px;margin-bottom:26px}
.kicker .dot{width:7px;height:7px;border-radius:50%;background:var(--sys,var(--accent));box-shadow:0 0 12px var(--sys,var(--accent))}
h1.title{font-family:var(--fh);font-weight:600;font-size:40px;line-height:1.12;letter-spacing:-.01em;max-width:26ch}
.slide .title .em{color:var(--sys,var(--accent))}
.titleRule{width:64px;height:2px;background:var(--sys,var(--accent));margin-top:18px;border-radius:2px}
.body{margin-top:26px;display:flex;flex-direction:column;gap:13px;max-width:60ch}
.body li{list-style:none;position:relative;padding-left:24px;font-size:19px;line-height:1.45;color:#dbe2f3}
.body li::before{content:"";position:absolute;left:0;top:11px;width:9px;height:1.5px;background:var(--sys,var(--accent))}
.hl{display:flex;gap:34px;margin-top:auto;padding-top:22px;flex-wrap:wrap}
.hl .stat{display:flex;flex-direction:column;gap:3px}
.hl .stat .v{font-family:var(--fh);font-weight:600;font-size:30px;color:var(--sys,var(--ink));letter-spacing:-.01em}
.hl .stat .l{font-family:var(--fm);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--inkDim)}
.foot{position:absolute;left:88px;right:88px;bottom:30px;display:flex;justify-content:space-between;align-items:center;
  font-family:var(--fm);font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--inkDim);
  border-top:1px solid var(--grid);padding-top:12px}
.foot .sec{color:var(--sys,var(--inkDim))}

/* layouts */
.layout-title{justify-content:center}
.layout-title h1.title{font-size:54px;max-width:24ch}
.layout-title .sub{margin-top:22px;font-size:20px;color:var(--inkDim);max-width:60ch;line-height:1.5}
.layout-statement{justify-content:center}
.layout-statement h1.title{font-size:46px;max-width:24ch}
.layout-bigstat{justify-content:center;align-items:flex-start}
.split{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;flex:1;margin-top:8px}
.split .col-r{align-self:stretch;display:flex;align-items:center;justify-content:center}
.chartWrap{flex:1;margin-top:18px;display:flex;flex-direction:column;min-height:320px}
.chartWrap svg{width:100%;flex:1;min-height:300px}
.split .col-r .chartWrap{width:100%;margin-top:0}
.cap{font-size:13px;color:var(--inkDim);margin-top:10px;line-height:1.4;max-width:92ch}
.figWrap{flex:1;margin-top:14px;display:flex;flex-direction:column;align-items:center;min-height:0}
.figWrap img{max-width:100%;max-height:74%;object-fit:contain;border:1px solid var(--grid);border-radius:8px;background:#0d1322}
.eqs{margin-top:22px;display:flex;flex-direction:column;gap:14px}
.eq{font-family:var(--fm);font-size:20px;color:#dbe7ff;background:var(--bgAlt);border:1px solid var(--grid);
  border-left:3px solid var(--sys,var(--accent));border-radius:8px;padding:16px 20px;line-height:1.5;overflow-x:auto}
.eq .lab{font-size:11px;color:var(--inkDim);letter-spacing:.14em;text-transform:uppercase;display:block;margin-bottom:6px;font-family:var(--fm)}
.tk{margin-top:24px;display:grid;grid-template-columns:1fr 1fr;gap:18px 40px}
.tk .item{display:flex;gap:16px;align-items:flex-start}
.tk .num{font-family:var(--fh);font-weight:700;font-size:30px;color:var(--sys,var(--accent));line-height:1;min-width:42px}
.tk .txt{font-size:18px;line-height:1.4;color:#dbe2f3}
table.tbl{width:100%;border-collapse:collapse;margin-top:18px;font-size:15.5px}
table.tbl th,table.tbl td{text-align:left;padding:11px 14px;border-bottom:1px solid var(--grid);vertical-align:top;line-height:1.35}
table.tbl thead th{font-family:var(--fm);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--inkDim);border-bottom:1px solid var(--inkDim)}
table.tbl thead th:nth-child(2){color:var(--pcrf)} table.tbl thead th:nth-child(3){color:var(--pigrpo)}
table.tbl td:first-child{font-family:var(--fm);font-size:13px;color:var(--inkDim);white-space:nowrap}
.specgrid{margin-top:18px;display:grid;grid-template-columns:1fr 1fr;gap:10px 36px}
.specgrid .row{display:flex;justify-content:space-between;gap:18px;border-bottom:1px solid var(--grid);padding:9px 0;font-size:16px}
.specgrid .row .k{color:var(--inkDim)} .specgrid .row .v{font-family:var(--fm);color:#dbe7ff;text-align:right}
.layout-closing{justify-content:center;align-items:flex-start}
.layout-closing h1.title{font-size:44px}
.badge{display:inline-block;font-family:var(--fm);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--warn);border:1px solid var(--warn);border-radius:999px;padding:4px 12px;margin-top:8px}

/* notes */
#notes{position:fixed;left:0;right:0;bottom:0;max-height:42vh;overflow:auto;background:rgba(8,11,20,.97);
  border-top:2px solid var(--accent);padding:18px 26px;z-index:60;display:none;backdrop-filter:blur(6px)}
#notes.show{display:block}
#notes .nh{font-family:var(--fm);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
#notes .nb{font-size:15px;line-height:1.6;color:#cdd6ea;max-width:120ch}
#hud{position:fixed;right:14px;top:12px;z-index:60;font-family:var(--fm);font-size:11px;color:var(--inkDim);
  letter-spacing:.1em;display:flex;gap:14px;align-items:center}
#hud .help{opacity:.7}
@media print{
  html,body{overflow:visible;height:auto}
  #stageWrap{position:static} #stage{transform:none!important;box-shadow:none;page-break-after:always;width:1280px;height:720px}
  .slide{display:flex!important;opacity:1!important;position:relative;page-break-after:always}
  #progress,#hud,#notes,.navbtn{display:none!important}
}
/* ---- touch / mobile ---- */
.navbtn{position:fixed;bottom:calc(16px + env(safe-area-inset-bottom));z-index:55;width:54px;height:54px;border-radius:50%;
  background:rgba(18,24,41,.82);border:1px solid var(--grid);color:var(--ink);font-size:26px;line-height:1;
  display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);
  -webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;cursor:pointer}
#prevBtn{left:calc(14px + env(safe-area-inset-left))} #nextBtn{right:calc(14px + env(safe-area-inset-right))}
#rotateHint{position:fixed;inset:0;z-index:70;display:none;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;gap:14px;padding:40px;background:rgba(5,7,13,.94);color:var(--ink)}
#rotateHint .ic{font-size:56px;color:var(--accent);animation:rh 2.4s ease-in-out infinite}
#rotateHint .t{font-family:var(--fh);font-weight:600;font-size:23px}
#rotateHint .s{color:var(--inkDim);font-size:15px;max-width:32ch;line-height:1.55}
#rotateHint button{margin-top:8px;font-family:var(--fm);font-size:13px;letter-spacing:.05em;color:var(--accent);
  background:none;border:1px solid var(--accent);border-radius:999px;padding:9px 20px}
@keyframes rh{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(82deg)}}
@media (pointer:coarse),(max-width:820px){ .navbtn{display:flex} #hud .help{display:none} }
</style>
</head>

<div id="progress"></div>
<div id="hud"><span id="counter">1 / 32</span><span class="help">&larr;/&rarr; nav &middot; N notes &middot; F full &middot; P print</span></div>
<div id="stageWrap"><div id="stage"></div></div>
<div id="notes"><div class="nh">Presenter notes</div><div class="nb" id="notesBody"></div></div>

const PAL={"bg": "#0A0E1A", "bgAlt": "#121829", "ink": "#EEF2FB", "inkDim": "#9AA6C2", "accent": "#5CE1D6", "accent2": "#F5A524", "pcrf": "#38BDF8", "pigrpo": "#F59E42", "good": "#4ADE80", "warn": "#FBBF24", "grid": "#24304A"}, SLIDES=[{"n": 1, "section": "OPENING", "kicker": "RAY SUMMIT / PYTORCH CONFERENCE", "title": "Two Systems, One Spine: Scaling Physics-Constrained AI from Demos to Production", "layout": "title", "body": ["Arun Sharma, PhD researcher, University of Minnesota Twin Cities", "Advised by Prof. Shashi Shekhar", "PC-RF: a physics-constrained climate downscaler (Ray Train)", "Pi-GRPO: physics-constrained RL post-training (Ray actor-learner)"], "highlights": [{"label": "Spine", "value": "Physics encoded twice"}, {"label": "Bottlenecks", "value": "Two opposite ones"}, {"label": "Diagnostic", "value": "MFU of one step"}], "chartRef": "", "figureRef": "", "equations": [], "notes": "Open warm and fast: I am Arun Sharma, a PhD researcher at the University of Minnesota, advised by Prof. Shashi Shekhar. Today I show two physics-constrained AI systems that share one design spine yet hit opposite distributed bottlenecks: PC-RF, a climate downscaler, and Pi-GRPO, an RL post-training stack. The impressive aside: I will give you a single number, the model-FLOPs-utilization of one training step, that tells the two regimes apart and picks your distributed primitive for you. This is not a new model and not a new RL algorithm; it is a measured characterization, a reusable recipe, and an auditable artifact. Set the frame for both crowds: systems people get the bottleneck analysis, execs get why physical validity is trust and trust is money. Transition: let me start with the hook that organizes everything."}, {"n": 2, "section": "OPENING", "kicker": "THE HOOK", "title": "Physics Is Cheap to Add to a Loss; Scaling It Is 95% of the Work", "layout": "statement", "body": ["A differentiable penalty is a few lines in the objective", "The hard part lives in the distributed-training and serving plane", "A demo runs on one GPU; production runs on a fleet", "Physical validity must hold at serving, not just in the notebook"], "highlights": [{"label": "Cheap", "value": "The loss term"}, {"label": "Expensive", "value": "The systems plane"}], "chartRef": "", "figureRef": "", "equations": ["L = L_RF + l1*L_div + l2*L_nn + l3*L_mass"], "notes": "Hit the hook hard and let it breathe. Adding a physics term to a loss is almost free: divergence-free wind, non-negative precipitation, mass conservation are each a differentiable penalty you bolt onto the objective. That is the easy 5%. The other 95% is everything around it: how you keep the step efficient across many GPUs, how you guarantee the output is physically valid at serving time, how you make the whole thing reproducible and auditable. The impressive aside: in PC-RF the training penalties only shape the field; a host-side projection at inference is what makes non-negativity and mass balance exact, for any model. So the physics that matters to a customer is enforced in the serving plane, not the loss. Transition: if the work is in the systems plane, then this is a business problem, not just a research one."}, {"n": 3, "section": "FRAMING", "kicker": "WHY IT MATTERS", "title": "The Spend and the Risk Live in the Distributed Plane, Where Physical Validity Becomes Trust", "layout": "split", "body": ["Physics-informed AI is moving from demos to production", "Training cost and serving risk scale with the fleet, not the notebook", "Physical validity is the difference between a plausible field and a usable one", "Exact validity at serving is auditable trust: a vessel that obeys a speed cap"], "highlights": [{"label": "Train", "value": "~21 A100 GPU-hours"}, {"label": "Serve", "value": "Validity exact"}, {"label": "Risk", "value": "Reward hacking"}], "chartRef": "", "figureRef": "", "equations": [], "notes": "Now speak to the CEO and CFO in the room. Physics-informed AI is leaving the demo phase, and when it does, the budget and the liability move into the distributed-training and serving plane. Two concrete dollars-and-risk hooks from real systems. One, PC-RF trains in about 21 A100 GPU-hours, cheap to add but you still pay for the fleet, and serving is where a field becomes either plausible or actually usable: our host-side projection drives non-negativity and mass-conservation error to exactly zero. Two, Pi-GRPO targets reward hacking: a fluent but physically wrong answer, a vessel exceeding a speed cap, that a human rater happily rewards yet is operationally wrong. Physical validity is trust, and trust is money. The impressive aside: the same physics shows up twice, as a loss and as a metric. Transition: that double-encoding is the thesis."}, {"n": 4, "section": "FRAMING", "kicker": "THE THESIS", "title": "One Spine, Two Opposite Bottlenecks: Physics Encoded Twice, Diagnosed by a Single Step", "layout": "split", "body": ["Spine: physics is both a differentiable loss term and a validity metric", "PC-RF is data-parallel throughput-bound (compute-light, cheap all-reduce)", "Pi-GRPO is rollout-generation-bound (the gradient is not the bottleneck)", "Pick the distributed primitive by where the one step is bound"], "highlights": [{"label": "PC-RF", "value": "Throughput-bound"}, {"label": "Pi-GRPO", "value": "Generation-bound"}, {"label": "Verdict", "value": "MFU of one step"}], "chartRef": "two_bottlenecks", "figureRef": "", "equations": ["max_theta E[R(x,y) - beta_KL*KL(pi_theta || pi_ref)]"], "notes": "This is the spine of the talk, say it slowly. In both systems physics is encoded twice: once as a differentiable term in the training objective, and once as a first-class validity metric you report and audit. Same spine, opposite distributed bottlenecks. PC-RF is a 7.6M-parameter rectified-flow downscaler; it is compute-light with a cheap all-reduce, so it is bound by data-parallel throughput, which sends you to Ray Train. Pi-GRPO fine-tunes a 7B policy under a hybrid reward; here the gradient is not the constraint, rollout generation is, so you disaggregate a vLLM rollout tier from an FSDP learner tier in a Ray actor-learner topology. The contribution is a measured characterization plus a reusable recipe plus an auditable artifact, not a new model or RL algorithm. The impressive aside: the fork diagram on screen comes from one number. Transition: let me put the two systems side by side."}, {"n": 5, "section": "FRAMING", "kicker": "TWO SYSTEMS AT A GLANCE", "title": "Same Physics-Twice Spine, Opposite Plane: a Downscaler and an RL Post-Trainer", "layout": "table", "body": ["PC-RF: 7.6M-param rectified-flow climate downscaler, ERA5 inputs", "Pi-GRPO: Qwen2-7B-Instruct policy under a hybrid physics reward", "Both encode physics as loss and as metric; both ship auditable artifacts", "Bottleneck flips from data-parallel throughput to rollout generation"], "highlights": [{"label": "PC-RF", "value": "Ray Train, DP"}, {"label": "Pi-GRPO", "value": "Actor-learner"}, {"label": "Shared", "value": "Physics twice"}], "chartRef": "correspondence_table", "figureRef": "architecture", "equations": [], "notes": "Walk the table left to right, one row at a time. Model: 7.6M-parameter rectified flow versus a 7B instruction-tuned policy, four orders of magnitude apart. Physics as loss: divergence-free, non-negative, mass-conserving penalties on one side; an unbounded kinematic-bicycle excess penalty on the other. Physics as metric: divergence error, non-negativity violation rate, mass-conservation error versus hard-violation and soft-bound rates. Bottleneck: data-parallel throughput with a cheap all-reduce versus rollout generation that dominates the step. Distributed primitive: Ray Train data-parallel, expected to go communication-bound past about four GPUs by analysis, versus a disaggregated vLLM-plus-FSDP actor-learner topology. The impressive aside: despite the four-orders-of-magnitude gap, the design grammar is identical, one rollout or data path, one validator, one reward or loss, then the heads or sampler. Transition: so what single measurement decides which column you are in? The MFU of one training step."}, {"n": 6, "section": "FRAMING", "kicker": "THE DIAGNOSTIC", "title": "The MFU of One Training Step Tells the Two Regimes Apart", "layout": "bigstat", "body": ["MFU = fraction of peak FLOPs the hardware actually does in one step", "High MFU: compute-bound, the step is real matmul; scale with data parallelism", "Low MFU: the step waits on something else (generation, communication)", "Pi-GRPO GRPO-step MFU is 4.7% on H100, rollout-generation-bound"], "highlights": [{"label": "GRPO-step MFU", "value": "4.7%"}, {"label": "Reading", "value": "Generation-bound"}, {"label": "Hardware", "value": "H100, 7B"}], "chartRef": "mfu_gauge", "figureRef": "", "equations": [], "notes": "This is the punchline of the framing, deliver it with confidence. Model-FLOPs-utilization is the fraction of the hardware's peak FLOPs your training step actually performs. It is the single cheapest diagnostic you can take, and it sorts the two regimes. If MFU is high, the step is genuinely compute-bound real matmul, and the right move is to scale data parallelism, that is the PC-RF world. If MFU is low, the step is waiting on something that is not the gradient. For Pi-GRPO the measured GRPO-step MFU is 4.7% on an H100 with a 7B model: that low number is not a bug, it is the signature of a rollout-generation-bound step, which is exactly why you disaggregate generation from learning. The impressive aside: one gauge reading replaces a week of guessing where to put your GPUs. Transition: with the diagnostic in hand, let me take you into the first system, PC-RF, and show the train-serve split that makes validity exact."}, {"n": 7, "section": "SYSTEM I: PC-RF", "kicker": "SYSTEM I / PC-RF", "title": "Generative downscalers paint sharp fields that break their own physics", "layout": "split", "body": ["Rectified flow super-resolves coarse climate fields into sharp ones", "The sharpening invents negative rain and divergent wind", "Conservation laws in the conditioning are silently violated", "Sharp and pretty is not the same as physically admissible", "A field a domain scientist cannot trust is not a deliverable"], "highlights": [{"label": "Model", "value": "7.6M-param conditional rectified flow"}, {"label": "Task", "value": "ERA5 downscale, base 64 to fine 128"}, {"label": "Inputs", "value": "precip + 10m u/v wind, 0.25deg"}], "chartRef": "", "figureRef": "", "equations": [], "notes": "Open the PC-RF act with the failure, not the model. Say: generative downscalers are trained to make coarse climate fields sharp, and they are very good at it, but sharpness is a perceptual target, not a physical one. Show how a model upsampling precipitation and 10m wind will happily produce negative rainfall and wind that is not divergence free, even though its own coarse conditioning obeyed those laws. The one impressive aside: the violation is invisible in an SSIM or PSNR score, so a model can look state of the art and still be inadmissible to a physicist. Frame the stakes for the execs: an unphysical field is not a product. Transition: so we encode physics twice, first as a differentiable penalty in training."}, {"n": 8, "section": "SYSTEM I: PC-RF", "kicker": "SYSTEM I / PC-RF", "title": "Three differentiable penalties put physics into the training objective", "layout": "equation", "body": ["L_div: penalize wind that is not divergence free", "L_nn: penalize negative precipitation", "L_mass: penalize domain mass that does not balance", "Penalties act on the one-step clean-field estimate", "Equal weights, no per-penalty tuning required"], "highlights": [{"label": "Weights", "value": "l1 = l2 = l3 = 1.0"}, {"label": "Applied to", "value": "one-step clean-field estimate"}, {"label": "Role", "value": "shape the field, not guarantee it"}], "chartRef": "", "figureRef": "", "equations": ["L = L_RF + l1 * L_div + l2 * L_nn + l3 * L_mass", "L_div = || div(wind_hat) ||^2", "L_nn = || max(0, -precip_hat) ||^2", "L_mass = ( sum(precip_hat) - sum(precip_coarse) )^2"], "notes": "Walk the loss line by line. Say: the rectified-flow loss handles fidelity; the three physics terms are differentiable residuals computed on the one-step clean-field estimate, so the gradient sees a physical field, not a noisy intermediate. L_div pushes wind toward divergence free, L_nn punishes negative rain, L_mass keeps the domain budget balanced. The impressive aside: all three weights are exactly 1.0, no per-term tuning, because these are honest residuals, not knobs we fit to the metric. Be precise that this only shapes the field; training penalties pull a model in the right direction but never make a constraint exactly hold at inference. That gap is the whole point of the next slide. Transition: so we split where physics is enforced from where it is learned."}, {"n": 9, "section": "SYSTEM I: PC-RF", "kicker": "SYSTEM I / PC-RF", "title": "The honest core: train to shape, project at serve to make it exact", "layout": "equation", "body": ["Training penalties shape the field but never guarantee it", "Host-side projection runs after the ODE sampler", "Softplus rectification forces non-negativity exactly", "One multiplicative rescale forces mass balance exactly", "Projection wraps ANY model, not just ours"], "highlights": [{"label": "NVR at serve", "value": "exactly 0"}, {"label": "MCE at serve", "value": "exactly 0"}, {"label": "Applies to", "value": "any model, model-agnostic"}], "chartRef": "", "figureRef": "", "equations": ["x_hat_f' = Pi(x_hat_f ; x_c)", "Pi: x -> softplus(x)   (non-negativity, exact)", "then rescale: x * ( sum(x_c) / sum(softplus(x)) )   (mass, exact)", "=> NVR = 0 and MCE = 0 by construction"], "notes": "This is the slide that should make the systems crowd lean in and the execs trust the work. Say: training penalties cannot make a hard constraint exactly hold, so we stop pretending they do. At serving, after the ODE sampler produces the field, a host-side projection Pi acts on the clean field conditioned on the coarse input: a softplus rectification makes non-negativity exact, then a single multiplicative rescale makes the domain mass match exactly. The result is NVR and MCE are zero by construction, not by hope, for any model you wrap, including a baseline that never saw a physics penalty. The impressive aside: this is the difference between a soft prior and a guarantee, and it is two lines of cheap host-side math. Honest caveat: the training penalty still earns its keep on the soft metric, divergence, which projection does not touch. Transition: here is the data path that makes this concrete."}, {"n": 10, "section": "SYSTEM I: PC-RF", "kicker": "SYSTEM I / PC-RF", "title": "Architecture: velocity net learns, host-side projection guarantees", "layout": "figure", "body": ["U-Net velocity net: fine 128, base 64, cross-attention", "Sinusoidal time embedding, FiLM land-surface conditioning", "ODE sampler (Euler/RK, 10-20 steps) runs the flow", "Projection Pi sits after sampling, on the host", "Clean separation: GPU learns, host enforces"], "highlights": [{"label": "Velocity net", "value": "7.6M params, U-Net"}, {"label": "Sampler", "value": "Euler/RK, 10-20 steps"}, {"label": "Conditioning", "value": "FiLM land-surface + cross-attn"}], "chartRef": "", "figureRef": "architecture", "equations": [], "notes": "Use the figure to make the train/serve boundary physical, not just conceptual. Trace the path: ERA5 precip and 10m wind enter at 0.25 degree, the U-Net velocity net with FiLM land-surface conditioning and cross-attention predicts the flow velocity, the ODE sampler integrates in 10 to 20 Euler or RK steps, and only then does the host-side projection enforce the hard constraints. Stress what is small: 7.6M parameters, a deliberately compute-light net. The impressive aside: because the projection lives outside the network, you can drop in a bigger or different velocity net later and the validity guarantee is unchanged, the physics is not entangled with the weights. For the execs, that is reusable infrastructure, not a one-off model. Transition: does the mechanism actually work where we control the ground truth? Go to the synthetic check."}, {"n": 11, "section": "SYSTEM I: PC-RF", "kicker": "SYSTEM I / PC-RF", "title": "Synthetic check: violations collapse to zero, fidelity improves too", "layout": "chart", "body": ["Controlled setting, ground truth exact, RF-base vs PC-RF", "NVR 0.236 to 0.000, MCE 0.184 to 0.000", "RMSE 0.140 to 0.112, SSIM 0.518 to 0.682", "Divergence error about 30% lower (0.0081 to 0.0057)", "Validity and accuracy move together, not in tension"], "highlights": [{"label": "NVR / MCE", "value": "0.236, 0.184 to 0"}, {"label": "RMSE / SSIM", "value": "0.140 to 0.112; 0.518 to 0.682"}, {"label": "DE", "value": "about 30% lower"}], "chartRef": "synthetic_bar", "figureRef": "", "equations": [], "notes": "This is the cleanest evidence, so slow down. Say: in a controlled synthetic setting where the ground truth is exact, we can read the mechanism directly. The hard constraints go to exactly zero, NVR from 0.236 and MCE from 0.184 both to 0, which is the projection doing its job. But the headline is that fidelity improves at the same time: RMSE drops from 0.140 to 0.112, SSIM jumps from 0.518 to 0.682, and the soft divergence error falls about 30 percent. The impressive aside: physics constraints often trade off against accuracy; here they reinforce it, because an admissible field is closer to the true field. Be disciplined: this is the controlled check, the place the separation is largest precisely because ground truth is exact. Transition: synthetic is the mechanism; the honest test is real ERA5, where the story gets more nuanced."}, {"n": 12, "section": "SYSTEM I: PC-RF", "kicker": "SYSTEM I / PC-RF", "title": "Real ERA5: projection makes both models exact, training keeps a small edge", "layout": "chart", "body": ["Single year 2020, one A100, RF-base vs PC-RF", "SSIM 0.912 to 0.914, PSNR 26.39 to 26.59, CRPS 1.188 to 1.149", "NVR and MCE exactly 0 for BOTH models", "Honest reading: projection, not the penalty, guarantees validity", "Ablation: dropping L_div raises DE 0.0634 to 0.0649, expected direction"], "highlights": [{"label": "CRPS", "value": "1.188 to 1.149"}, {"label": "NVR / MCE", "value": "0 / 0 for both models"}, {"label": "Ablation DE", "value": "0.0634 full vs 0.0649 no_div"}], "chartRef": "era5_bar", "figureRef": "", "equations": [], "notes": "Lead with the honesty, that is what earns credibility with a skeptical systems audience. Say: on real ERA5 for 2020 the projection makes both the baseline and PC-RF exactly valid, NVR and MCE are zero for both, so validity at deployment is bought by the projection, not by the training penalty alone. PC-RF still keeps a small perceptual and probabilistic edge: SSIM 0.912 to 0.914, PSNR 26.39 to 26.59, CRPS 1.188 to 1.149. The ablation is the integrity check: removing the divergence penalty raises divergence error from 0.0634 to 0.0649, the expected direction, while SSIM stays inside run-to-run noise. The impressive aside: I am telling you where the gain is small on purpose, because the large, clean separation lives in the synthetic check where ground truth is exact. Transition: let me show the field itself in the demo."}, {"n": 13, "section": "SYSTEM I: PC-RF", "kicker": "SYSTEM I / PC-RF", "title": "The demo: coarse input to admissible field you can audit", "layout": "figure", "body": ["Coarse input, PC-RF field, ground truth, side by side", "Wind and divergence panels make the constraint visible", "Non-negativity and mass balance hold by construction", "Reproducible: 46 CPU unit tests plus an e2e test", "E2e asserts NVR to 0 and MCE below 1e-3"], "highlights": [{"label": "Unit tests", "value": "46 CPU"}, {"label": "E2e assertion", "value": "NVR to 0, MCE < 1e-3"}, {"label": "Panels", "value": "coarse, PC-RF, truth, wind/div"}], "chartRef": "", "figureRef": "demo", "equations": [], "notes": "Use the demo to make the abstract guarantee tangible and auditable. Walk the panels: coarse input on the left, the PC-RF field, the ground truth, then the wind and divergence panels that let a domain scientist see the physics, not just the picture. Say: the field is not just sharper, it is admissible, and you can check it. The impressive aside is the reproducibility spine: 46 CPU unit tests plus an end-to-end test that asserts NVR drives to zero and MCE stays below 1e-3, so the validity claim is enforced in CI, not asserted in a slide. For the execs, that is the difference between a research demo and something you can ship and trust. Transition: the model works and is valid; the systems question is what limits throughput and which distributed primitive to reach for."}, {"n": 14, "section": "SYSTEM I: PC-RF", "kicker": "SYSTEM I / PC-RF", "title": "Throughput-bound: data-parallel now, comms-bound past ~4 GPUs", "layout": "split", "body": ["Compute-light net, cheap all-reduce: data-parallel throughput bound", "Ray Train is the right primitive at this scale", "Expected to go communication-bound past ~4 GPUs (analytical)", "Serving: export only the velocity net to ONNX + AOTInductor", "Sampler and projection run host-side, matched to eager ~1e-6"], "highlights": [{"label": "Bottleneck", "value": "data-parallel throughput"}, {"label": "Primitive", "value": "Ray Train"}, {"label": "Train cost", "value": "~21 A100 GPU-hours, 300 epochs"}], "chartRef": "", "figureRef": "", "equations": [], "notes": "Close the act by connecting the model to the merge thesis. Say: PC-RF is compute-light with a small all-reduce, so one training step is throughput bound, which is exactly what data-parallel Ray Train is for. Give the cost honestly: 300 epochs, about 74.6 seconds per epoch on one A100, roughly 21 GPU-hours total, this is not a hero run. Be careful with the scaling claim: past about 4 GPUs we expect it to go communication bound, and I am labeling that analytical, not measured, because honest scope is the whole point of this talk. On serving, we export only the velocity net to ONNX and AOTInductor, matched to eager at about 1e-6 across unseen batch sizes, and run the ODE sampler and projection on the host. The impressive aside: the projection never enters the graph, so the guarantee survives any export. Transition: same physics spine, opposite bottleneck, next is Pi-GRPO."}, {"n": 15, "section": "SYSTEM II: Pi-GRPO", "kicker": "SYSTEM II / Pi-GRPO", "title": "Reward hacking: fluent-but-wrong wins the rater, fails operations", "layout": "statement", "body": ["Human raters reward the most fluent completion", "A vessel exceeding its speed cap reads as plausible", "Plausible-but-infeasible is operationally wrong", "Preference signal alone cannot see physics", "RL post-training amplifies whatever the reward rewards"], "highlights": [{"label": "Policy", "value": "Qwen2-7B-Instruct"}, {"label": "Preference triples", "value": "11k (8k human + 3k curator)"}], "chartRef": "", "figureRef": "", "equations": [], "notes": "Open on the failure that motivates the whole system. Say: we fine-tune a Qwen2-7B-Instruct policy on 11,000 preference triples, 8k human-in-the-loop plus 3k from a curator that ranks K=8 rollouts. The trap is reward hacking. A completion that describes a vessel exceeding its speed cap is fluent, so human raters prefer it, yet it is physically infeasible and operationally wrong. Preference learning optimizes exactly that human signal, so RL faithfully amplifies the wrong thing. The intuition: the rater grades prose, not kinematics. The impressive aside: this is not hypothetical; we built a probe that catches it numerically, shown in five slides. Transition: if the human signal is blind to physics, we have to put physics into the reward itself, as a term that cannot be smoothed away."}, {"n": 16, "section": "SYSTEM II: Pi-GRPO", "kicker": "SYSTEM II / Pi-GRPO", "title": "An unbounded hard physics term is the structural anti-hacking defense", "layout": "equation", "body": ["Hybrid reward mixes hard, soft, data, and preference", "R_hard sums relative excess over S-KBM kinematic bounds", "Unbounded by design: one violation dominates the gradient", "Curvature cap kappa_max = |tan delta_max| / L", "This is structure, not a tuning knob"], "highlights": [{"label": "R_hard", "value": "unbounded"}, {"label": "Bounds", "value": "velocity, accel, curvature"}], "chartRef": "", "figureRef": "", "equations": ["R(tau) = w_hard*R_hard + w_soft*R_soft + w_data*R_data + w_pref*R_pref", "R_hard = -sum_i max(0, (q_i - q_i^max) / q_i^max)", "kappa_max = |tan(delta_max)| / L"], "notes": "This is the conceptual heart of System II, so slow down. The reward is a weighted sum of four terms: hard physics, soft physics, data fidelity, and human preference. The defense lives in R_hard. It sums the relative excess over single-axle kinematic-bicycle bounds on velocity, acceleration, and curvature, where the curvature cap comes from the steering geometry, kappa_max equals tan of max steering angle over wheelbase. The key word is unbounded. A bounded penalty can be out-voted by enough preference reward; an unbounded one cannot. One real physical violation produces a gradient that dominates everything else, so the policy cannot trade a little infeasibility for a lot of fluency. Say plainly: this is structural, not a hyperparameter we tuned. Transition: with one reward defined, the question is which RL algorithm consumes it."}, {"n": 17, "section": "SYSTEM II: Pi-GRPO", "kicker": "SYSTEM II / Pi-GRPO", "title": "One reward, three interchangeable trainer heads", "layout": "equation", "body": ["GRPO: group-relative advantage, no value head", "PPO: clipped surrogate, value head, adaptive KL", "DPO: augmented with a physics penalty gamma_phys", "gamma_phys = 0 recovers vanilla DPO exactly", "Shared spine: one rollout engine, one parser, one reward"], "highlights": [{"label": "Heads", "value": "GRPO / PPO / DPO"}, {"label": "DPO knob", "value": "gamma_phys (0 = vanilla)"}], "chartRef": "", "figureRef": "", "equations": ["max_theta E[ R(x,y) - beta_KL * KL(pi_theta || pi_ref) ]", "A_k = (R_k - mu_K) / sigma_K", "L_DPO = L_DPO_vanilla + gamma_phys * R_hard"], "notes": "The framing point: we did not invent an RL algorithm, we built a substrate where the same reward drives three heads interchangeably. All three optimize the same KL-regularized return: maximize reward minus beta times KL to the frozen reference. GRPO uses a group-relative advantage, reward minus group mean over group std, so it needs no value network. PPO adds the clipped surrogate, a value head, and an adaptive KL controller. DPO is augmented with a physics penalty gamma_phys; set it to zero and you recover vanilla DPO exactly, which makes the physics contribution auditable by ablation. The impressive aside: one rollout engine, one parser-validator, one reward, three heads you can swap without touching the data path. Content-addressed checkpoints and an append-only manifest make every run reproducible. Transition: so where does the time actually go? Not the gradient."}, {"n": 18, "section": "SYSTEM II: Pi-GRPO", "kicker": "SYSTEM II / Pi-GRPO", "title": "The training step is rollout-bound: MFU is 4.7%", "layout": "bigstat", "body": ["MFU of one GRPO step, H100, 7B policy", "The GPU is starved waiting on token generation", "Bottleneck is rollout generation, not the gradient", "Adding learner ranks does not help", "Diagnostic verdict: scale the rollout tier"], "highlights": [{"label": "GRPO-step MFU", "value": "4.7%"}, {"label": "Bound by", "value": "rollout generation"}], "chartRef": "mfu_gauge", "figureRef": "", "equations": [], "notes": "Here is the diagnostic that defines System II. We measured the model-FLOPs-utilization of a single GRPO step on an H100 with the 7B policy: 4.7 percent. For a systems crowd that number is a siren. It means the accelerator sits idle almost the entire step, starved, because the time is spent generating rollout tokens autoregressively, not computing the gradient. The reframe that matters to execs and engineers alike: the instinct is to add more learner GPUs, but that speeds up the part that is already cheap. It does nothing. The bottleneck is generation. So the correct move is to scale and optimize the rollout tier, separately from the learner. This mirrors System I exactly: one number, the step MFU, tells you which distributed primitive to reach for. Transition: optimize generation first, and the single biggest lever is the inference engine."}, {"n": 19, "section": "SYSTEM II: Pi-GRPO", "kicker": "SYSTEM II / Pi-GRPO", "title": "vLLM gives 30x rollout throughput over HF generate", "layout": "chart", "body": ["vLLM 13,554 tok/s at batch 128 on H100", "HF generate 451 tok/s at batch 8", "Batch-matched vLLM still 3,944 tok/s at batch 32", "Prefix caching adds ~4x on long shared prompts", "Generation is the lever; this is where it moves"], "highlights": [{"label": "30x", "value": "13,554 vs 451 tok/s"}, {"label": "Batch-matched", "value": "3,944 tok/s"}], "chartRef": "vllm_throughput", "figureRef": "", "equations": [], "notes": "Having localized the bottleneck to generation, this is the payoff. On one H100, vLLM produces 13,554 tokens per second at batch 128 against HuggingFace generate at 451 tokens per second at batch 8: a 30x gap. Be honest about the comparison, because a sharp audience will ask: those are different batch sizes, so part of the win is throughput at scale. Batch-matched at 32, vLLM still delivers 3,944 tokens per second, several times HF, so the engine itself, paged KV cache and continuous batching, carries most of the win. The impressive aside: prefix caching adds roughly 4x on long prompts that share a common prefix, which rollout workloads do constantly. Transition: a fast rollout tier exposes the learner; next we feed it without stalling, and that is the actor-learner topology."}, {"n": 20, "section": "SYSTEM II: Pi-GRPO", "kicker": "SYSTEM II / Pi-GRPO", "title": "Disaggregate rollout from learner: FSDP at 9,041 tok/s", "layout": "split", "body": ["Ray actor-learner: vLLM rollout tier feeds FSDP learner", "FSDP FULL_SHARD 9,041 tok/s aggregate on 4xA100", "2,260 tok/s/gpu, 23.1 GB/rank, seq 1024, single node", "Two tiers, two bottlenecks, scaled independently", "Triton fused RMSNorm adds 3.1x on the hot path"], "highlights": [{"label": "FSDP aggregate", "value": "9,041 tok/s"}, {"label": "Per-GPU", "value": "2,260 tok/s, 23.1 GB"}], "chartRef": "two_bottlenecks", "figureRef": "", "equations": [], "notes": "This is the architecture in one picture. A Ray actor-learner topology runs two tiers: vLLM actors generate rollouts, an FSDP learner consumes them and updates weights. We measured the learner at 9,041 tokens per second aggregate under FULL_SHARD on four A100s, single node, which is 2,260 per GPU at 23.1 gigabytes per rank with sequence length 1024. The systems point is the fork: generation and gradient are different bottlenecks, so we scale them independently rather than co-locating and starving one. The impressive aside for the kernel people: a Triton fused RMSNorm gives 3.1x on that hot path, the kind of low-level win that compounds across every step. The exec translation: this is a reusable serving-and-training recipe, not a one-off. Transition: speed is necessary but not the headline. Does the physics reward actually stop reward hacking? We measured that too."}, {"n": 21, "section": "SYSTEM II: Pi-GRPO", "kicker": "SYSTEM II / Pi-GRPO", "title": "The probe: physics reward catches 5/5 hacks, preference-only catches 0", "layout": "chart", "body": ["Preference-only rewards infeasible at +10.0, catches 0/5", "Physics-grounded scores infeasible at -490.5, catches 5/5", "Feasible completions stay rewarded at +10.0 in both", "Unbounded R_hard turns a hack into a dominating penalty", "This is the validity result, measured on CPU"], "highlights": [{"label": "Caught", "value": "0/5 to 5/5"}, {"label": "Infeasible reward", "value": "+10.0 to -490.5"}], "chartRef": "reward_hacking", "figureRef": "", "equations": [], "notes": "This is the slide that proves the thesis, so land it cleanly. We built a controlled probe with known-infeasible and known-feasible completions. With preference only, weight on hard physics set to zero, the infeasible completions score a mean total reward of plus 10.0, identical to feasible, and the system catches zero of five hacks. Turn on the physics term at its default weight of 5 and the same infeasible completions crash to a mean of minus 490.5, all five caught, while feasible completions still sit at plus 10.0. That asymmetry is the whole design: the unbounded term leaves good behavior untouched and makes one violation catastrophic. Say to the execs: this is the difference between a model that sounds right and one that is operationally safe. Honesty note: this probe runs on CPU; it validates the reward, not the full trained policy. Transition: a reward you can trust needs guardrails around it."}, {"n": 22, "section": "SYSTEM II: Pi-GRPO", "kicker": "SYSTEM II / Pi-GRPO", "title": "Guardrails and reproducibility: 13/13 tests, KL held, golden eval", "layout": "table", "body": ["13/13 acceptance tests pass on CPU", "Golden evaluator: R_hard -8.66 on speeding, 0 on clean", "Adaptive KL holds PPO mean KL in [3,8] over 3,000 steps", "Ablations spike KL > 50 within 500 steps", "Safe-range guard: 100% rejection, 0 false positives"], "highlights": [{"label": "Acceptance", "value": "13/13 pass"}, {"label": "Hot path", "value": "S-KBM 43 us, reward 52 us"}], "chartRef": "", "figureRef": "", "equations": [], "notes": "This slide is for the skeptic who has seen demos that do not survive contact with a test suite. Everything here is measured on CPU. Thirteen of thirteen acceptance tests pass. The golden-dataset evaluator returns R_hard of minus 8.66 on a known speeding case, flagged as a hard violation, and zero on a clean case, two of two correct. The adaptive KL controller holds PPO mean KL inside the band 3 to 8 across 3,000 steps, while ablations without it spike KL above 50 within 500 steps, so the controller is doing real work. The safe-range guard rejects 100 percent of 100 out-of-range samples with zero false positives. Microbenchmarks: the kinematic check runs at 43 microseconds, the full hybrid reward at 52, fast enough to live on the hot path. Transition: now the part most talks skip, what is not yet measured."}, {"n": 23, "section": "SYSTEM II: Pi-GRPO", "kicker": "SYSTEM II / Pi-GRPO", "title": "Honest scope: full run in progress, some targets not yet measured", "layout": "statement", "body": ["Full Qwen2-7B-Instruct run still in progress (1xH100 train + 1xH100 vLLM)", "Trained-policy violation rates are diagnostic targets, not measurements", "Cross-node 2-node FSDP is communication-bound on the fabric", "No multi-node scaling-efficiency number is claimed", "Contribution: a characterization and a recipe, not a new model or algorithm"], "highlights": [{"label": "Claimed", "value": "measured systems + validity"}, {"label": "Deferred", "value": "trained-policy metrics"}], "chartRef": "", "figureRef": "", "equations": [], "notes": "End System II with the credibility move: state plainly what is not done. The full-scale Qwen2-7B-Instruct run, one H100 training and one H100 serving rollouts, is still running, so I do not show final trained-policy numbers. The violation-rate figures in our plan, supervised base versus GRPO with a hard floor, are diagnostic targets we are steering toward, not results, and I label them that way. Two-node FSDP is communication-bound on the fabric, a GPUDirect-RDMA admin limitation on this cluster, so I claim no multi-node scaling-efficiency number; that would be dishonest. Say to the room, especially the execs: the contribution is a measured characterization of where these workloads bind plus a reusable recipe and an auditable artifact, not a new model and not a new RL algorithm. That discipline, claiming exactly what was measured, is the whole point. Transition: now let me put both systems side by side."}, {"n": 24, "section": "THE RECIPE", "kicker": "DIAGNOSTIC -> PRIMITIVE", "title": "Measure the MFU of one step; let the bottleneck pick the primitive", "layout": "chart", "body": ["Step 1: measure per-step model-FLOPs-utilization (MFU).", "Compute-light, cheap all-reduce: data-parallel replicas (Ray Train).", "Serve by export-and-host-side-sampler (ONNX velocity net + projection).", "Generation-bound: disaggregate a rollout tier from a learner tier.", "vLLM rollout actors feed an FSDP learner in an actor-learner topology."], "highlights": [{"label": "PC-RF step", "value": "compute-light"}, {"label": "Pi-GRPO step MFU", "value": "4.7%"}, {"label": "decision input", "value": "one step"}], "chartRef": "recipe_tree", "figureRef": "", "equations": [], "notes": "Say: this is the whole talk compressed to a rule you can run Monday. Profile one training step and read its MFU. If the GPUs are busy and the gradient sync is cheap, you are compute-light: scale with data-parallel replicas on Ray Train, and you can serve by exporting just the velocity net and running the ODE sampler plus the physics projection host-side. That is PC-RF. If instead the step stalls waiting on token generation, you are rollout-bound: do not buy a bigger all-reduce, split the system into a vLLM generation tier and an FSDP learner tier in an actor-learner topology. That is Pi-GRPO at 4.7% MFU. The impressive aside: the diagnostic is one number, not a research project. Transition: the honest part is knowing exactly which claims this rule rests on, which is the next slide."}, {"n": 25, "section": "THE RECIPE", "kicker": "CREDIBILITY", "title": "Honest scope: what is measured, what is single-node, what is still running", "layout": "bullets", "body": ["PC-RF: 21 A100 GPU-hours measured on one A100-SXM4-40GB.", "PC-RF >4 GPU comm-bound is analytical, not measured.", "Pi-GRPO systems numbers measured on H100 and 4xA100 single node.", "Full-scale Qwen2-7B run still running; policy targets are diagnostic only.", "Cross-node 2-node FSDP is fabric comm-bound; no scaling number claimed."], "highlights": [{"label": "measured", "value": "single-node"}, {"label": "in-progress", "value": "full-scale + multi-node"}, {"label": "claimed scaling", "value": "none cross-node"}], "chartRef": "", "figureRef": "", "equations": [], "notes": "Say: credibility is a feature, so let me draw the line precisely. Everything I showed as a number was measured on real hardware: PC-RF trained in about 21 A100 GPU-hours on a single A100-SXM4-40GB; the Pi-GRPO throughput, MFU, and reward-hacking results are on an H100 and a 4xA100 single node. Two things I will not oversell. First, PC-RF going communication-bound past four GPUs is an analytical expectation, not a measurement. Second, the full-scale Qwen2-7B run is still running, so the trained-policy violation rates are diagnostic targets, not results, and 2-node FSDP is communication-bound on the fabric from a GPUDirect-RDMA admin limitation, so I claim no multi-node scaling-efficiency number. The aside: saying this out loud is what makes the measured numbers trustworthy. Transition: so why should a business care about an engineer who talks this way."}, {"n": 26, "section": "THE RECIPE", "kicker": "BUSINESS CASE", "title": "This is the engineer who owns the expensive 95%", "layout": "statement", "body": ["Picks the right distributed primitive from a measurement, not a guess.", "Ships validity as a serving-time guarantee, not a hope.", "Precise about demonstrated vs in-progress: lower risk, lower cost.", "Net effect: trustworthy scientific AI on a predictable budget."], "highlights": [{"label": "owns", "value": "the 95% spend"}, {"label": "validity", "value": "serving-time guarantee"}, {"label": "result", "value": "lower risk + cost"}], "chartRef": "", "figureRef": "", "equations": [], "notes": "Say, aimed at the exec in the room: training and serving is where the GPU bill lives, and this is the engineer who owns that 95 percent. Three concrete behaviors. One, the distributed primitive is chosen from a measured bottleneck, so you do not pay for a fabric upgrade when the real problem is token generation. Two, physical validity is a serving-time guarantee via the host-side projection, so any model deployed is exactly valid, not merely nudged in the right direction during training. Three, the demonstrated-versus-in-progress discipline means roadmaps are honest, which lowers integration risk and avoids surprise rework. The aside: precision about what is proven is itself a cost-control mechanism. Net: trustworthy scientific AI on a budget you can forecast. Transition: let me crystallize this into four takeaways."}, {"n": 27, "section": "TAKEAWAYS", "kicker": "TAKEAWAYS", "title": "Four things to carry out of this room", "layout": "takeaways", "body": ["Encode physics twice: a differentiable loss term and a validity metric.", "One spine, two opposite bottlenecks; MFU of one step tells them apart.", "Match the primitive to the bound: data-parallel vs actor-learner disaggregation.", "Make validity exact at serving via a host-side projection; report scope honestly."], "highlights": [{"label": "physics", "value": "encoded twice"}, {"label": "diagnostic", "value": "1-step MFU"}, {"label": "guarantee", "value": "projection at serve"}], "chartRef": "", "figureRef": "", "equations": [], "notes": "Say: four takeaways, then I am done. First, encode physics twice: once as a differentiable penalty that shapes the field during training, and once as a first-class validity metric you can audit. Second, the same physics-informed spine hits opposite distributed bottlenecks, and the model-FLOPs-utilization of a single training step is the cheap diagnostic that tells them apart. Third, pick the distributed primitive from that bound: data-parallel replicas when you are compute-light, generation-learner disaggregation when you are rollout-bound. Fourth, make validity exact at serving time with a host-side projection, and be honest about measured versus in-progress scope. The aside: none of this is a new model or a new RL algorithm; it is a measured characterization plus a reusable recipe plus an auditable artifact. Transition: thank you, and here is how to reach me."}, {"n": 28, "section": "CLOSING", "kicker": "THANK YOU", "title": "Thank you. Physics encoded twice; the bottleneck picks the primitive.", "layout": "closing", "body": ["Arun Sharma, PhD researcher in CS, University of Minnesota Twin Cities.", "Advised by Prof. Shashi Shekhar.", "PC-RF presented at Ray Summit; Pi-GRPO serving stack at PyTorch Conference.", "Contribution: measured characterization, reusable recipe, auditable artifact."], "highlights": [{"label": "Speaker", "value": "Arun Sharma"}, {"label": "Institution", "value": "UMN Twin Cities"}, {"label": "Advisor", "value": "Prof. Shashi Shekhar"}], "chartRef": "", "figureRef": "", "equations": [], "notes": "Say: thank you. One sentence to remember: encode physics twice, then let the bottleneck pick the primitive. I am Arun Sharma, a PhD researcher in computer science at the University of Minnesota Twin Cities, advised by Prof. Shashi Shekhar. The two systems map to the two communities here: PC-RF is the distributed-training story for Ray Summit, and the Pi-GRPO serving stack is the PyTorch Conference story. What I am offering is not a new model or a new RL algorithm; it is a measured characterization, a reusable recipe, and an auditable artifact you can run yourself. The aside: the appendix has every equation, hyperparameter, and the full two-system correspondence, so anyone who wants to reproduce or challenge the work can. I am happy to take questions, and I would love to talk about applying this to your hardest validity-critical workloads."}, {"n": 29, "section": "APPENDIX", "kicker": "APPENDIX", "title": "Appendix: equations, hyperparameters, and the two-system correspondence", "layout": "title", "body": ["Full objective and penalty set for PC-RF and Pi-GRPO.", "Complete hyperparameters and reproducibility substrate.", "Side-by-side correspondence of the two systems."], "highlights": [], "chartRef": "", "figureRef": "", "equations": [], "notes": "Say, briefly if questions push here: this is the reference section. Three slides: the full equation set for both systems, the complete hyperparameters and reproducibility substrate, and a single correspondence table that lines up PC-RF and Pi-GRPO term by term. I will not walk these line by line unless you want me to; they exist so the work is checkable. The aside: every number on these slides is either measured or explicitly labeled in-progress, consistent with the honesty discipline from the main talk. Transition: let me put up the equations first."}, {"n": 30, "section": "APPENDIX", "kicker": "FULL EQUATIONS", "title": "The complete objective set: training penalties, projection, and three RL heads", "layout": "equation", "body": ["PC-RF: training penalties shape the field; the projection makes validity exact.", "Pi-GRPO: one KL-regularized return, one hybrid reward, three interchangeable heads.", "R_hard is unbounded by design so one violation dominates the gradient."], "highlights": [{"label": "PC-RF weights", "value": "l1=l2=l3=1.0"}, {"label": "DPO recovery", "value": "gamma_phys=0"}, {"label": "GRPO advantage", "value": "no value head"}], "chartRef": "", "figureRef": "", "equations": ["L = L_RF + l1*L_div + l2*L_nn + l3*L_mass,  l1=l2=l3=1.0", "L_div: divergence-free wind; L_nn: non-negative precip; L_mass: domain mass conservation", "Pi(x_hat_f; x_c): softplus rectification + one multiplicative mass rescale (exact at serving)", "max_theta E[R(x,y) - beta_KL*KL(pi_theta || pi_ref)]", "R(tau) = w_hard*R_hard + w_soft*R_soft + w_data*R_data + w_pref*R_pref", "R_hard = unbounded sum of relative excess over S-KBM velocity/accel/curvature bounds; kappa_max = |tan delta_max| / L", "DPO_phys = vanilla DPO + gamma_phys penalty (gamma_phys = 0 recovers vanilla DPO)", "GRPO advantage: A_k = (R_k - mu_K) / sigma_K"], "notes": "Say: this is the full math, one screen. Top half is PC-RF: the total loss adds three differentiable physics penalties, divergence-free wind, non-negative precipitation, and domain mass conservation, each weighted one, to the rectified-flow loss. Crucially, the host-side projection Pi, a softplus rectification plus one multiplicative mass rescale, is what makes non-negativity and mass balance exact at serving for any model; the training penalties only shape the field. Bottom half is Pi-GRPO: a KL-regularized return objective, a hybrid reward with four weighted terms, and the structural anti-reward-hacking piece, R_hard, an unbounded sum of relative excess over the single-axle kinematic-bicycle bounds, so one physical violation dominates the gradient. One reward feeds three interchangeable heads: GRPO with group-relative advantage and no value head, PPO, and DPO augmented by gamma_phys, where gamma_phys equal to zero recovers vanilla DPO. Transition: next, the exact hyperparameters and test counts."}, {"n": 31, "section": "APPENDIX", "kicker": "HYPERPARAMETERS", "title": "Full hyperparameters and the reproducibility substrate", "layout": "table", "body": ["PC-RF: 7.6M params, fine=128/base=64, 300 epochs, batch 32, ~21 A100 GPU-hours.", "PC-RF substrate: 46 CPU unit tests + e2e asserting NVR->0 and MCE<1e-3.", "Pi-GRPO: Qwen2-7B-Instruct, 11k preference triples (8k HITL + 3k curator K=8).", "Pi-GRPO substrate: content-addressed manifest + 13 acceptance tests."], "highlights": [{"label": "PC-RF cost", "value": "~21 A100 GPU-hr"}, {"label": "PC-RF tests", "value": "46 unit + e2e"}, {"label": "Pi-GRPO tests", "value": "13"}], "chartRef": "", "figureRef": "", "equations": [], "notes": "Say: the reproducibility receipts. PC-RF is a 7.6-million-parameter conditional rectified-flow downscaler, fine grid 128 over base 64, trained 300 epochs at batch 32 in about 74.6 seconds per epoch on one A100-SXM4-40GB, roughly 21 A100 GPU-hours total under CUDA 12.1 and PyTorch 2.4.0. It ships with 46 CPU unit tests plus an end-to-end test that asserts the non-negativity violation rate goes to zero and the mass-conservation error is under 1e-3. Pi-GRPO fine-tunes Qwen2-7B-Instruct on 11,000 preference triples, 8,000 human-in-the-loop plus 3,000 from a curator running K equals 8 rollout-and-rank, with content-addressed checkpoints, an append-only manifest, and 13 acceptance tests. The aside: content-addressed plus append-only means the artifact is auditable, you can verify exactly which checkpoint produced which number. Transition: finally, the two systems side by side."}, {"n": 32, "section": "APPENDIX", "kicker": "CORRESPONDENCE", "title": "Two systems, one spine: the side-by-side correspondence", "layout": "table", "body": ["Shared spine: physics as a differentiable loss term and as a validity metric.", "PC-RF bottleneck = data-parallel throughput; Pi-GRPO = rollout generation.", "PC-RF primitive = Ray Train replicas; Pi-GRPO = vLLM + FSDP actor-learner.", "PC-RF serving = export velocity net + host-side projection; Pi-GRPO = disaggregated tiers."], "highlights": [{"label": "diagnostic", "value": "1-step MFU"}, {"label": "PC-RF", "value": "compute-light"}, {"label": "Pi-GRPO MFU", "value": "4.7%"}], "chartRef": "correspondence_table", "figureRef": "", "equations": [], "notes": "Say: the closing artifact, both systems on one grid. Same spine: physics encoded twice, a differentiable penalty in the objective and a first-class validity metric. Then they diverge at the bottleneck. PC-RF is compute-light with cheap all-reduce, so its bottleneck is data-parallel throughput and its primitive is Ray Train replicas, with serving done by exporting only the velocity net to ONNX plus AOTInductor and running the sampler and projecti const stage=document.getElementById('stage');

function sysOf(s){
  const t=((s.kicker||'')+' '+(s.section||'')+' '+(s.title||'')).toUpperCase();
  if(t.includes('PC-RF')||t.includes('PCRF')) return 'var(--pcrf)';
  if(t.includes('PI-GRPO')||t.includes('PIGRPO')||t.includes('GRPO')) return 'var(--pigrpo)';
  return 'var(--accent)';
}
const esc=s=>(s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function emph(t){ // highlight a key span wrapped in *...* if present, else leave
  return esc(t).replace(/\*(.+?)\*/g,'<span class="em">$1</span>');
}
const fmt=(v,f)=>{try{const m=f.match(/\{:\.(\d+)f\}/);return m?Number(v).toFixed(+m[1]):String(v);}catch(e){return String(v);}}
const nf=v=>v.toLocaleString('en-US');

/* ---------- charts (SVG, data-driven) ---------- */
function chSmallmult(c){
  const W=940,H=360,n=c.metrics.length,pad=46,gap=26;
  const gw=(W-pad*2-gap*(n-1))/n, base=H-70, top=46, bh=base-top;
  let g='';
  c.metrics.forEach((m,i)=>{
    const x=pad+i*(gw+gap), mx=Math.max(m.base,m.pcrf)||1;
    const bw=Math.min(46,gw/2-14), x1=x+gw/2-bw-6, x2=x+gw/2+6;
    const hB=Math.max(2,bh*(m.base/mx)), hP=Math.max(2,bh*(m.pcrf/mx));
    const good=m.good==='down'?'var(--good)':'var(--good)';
    g+=`<g>
      <rect x="${x1}" y="${base-hB}" width="${bw}" height="${hB}" rx="3" fill="var(--inkDim)" opacity=".55"/>
      <rect x="${x2}" y="${base-hP}" width="${bw}" height="${hP}" rx="3" fill="${good}"/>
      <text x="${x1+bw/2}" y="${base-hB-8}" fill="var(--inkDim)" font-size="12" font-family="var(--fm)" text-anchor="middle">${fmt(m.base,m.fmt)}</text>
      <text x="${x2+bw/2}" y="${base-hP-8}" fill="var(--good)" font-size="12.5" font-family="var(--fm)" text-anchor="middle" font-weight="600">${fmt(m.pcrf,m.fmt)}</text>
      <text x="${x+gw/2}" y="${base+22}" fill="var(--ink)" font-size="15" font-family="var(--fh)" text-anchor="middle" font-weight="600">${m.name}</text>
      <text x="${x+gw/2}" y="${base+40}" fill="var(--inkDim)" font-size="11" font-family="var(--fm)" text-anchor="middle">${m.good==='up'?'higher better':'lower better'}</text>
    </g>`;
  });
  g+=`<g font-family="var(--fm)" font-size="12">
     <rect x="${pad}" y="14" width="13" height="13" rx="2" fill="var(--inkDim)" opacity=".55"/><text x="${pad+20}" y="25" fill="var(--inkDim)">RF-base</text>
     <rect x="${pad+110}" y="14" width="13" height="13" rx="2" fill="var(--good)"/><text x="${pad+130}" y="25" fill="var(--ink)">PC-RF</text></g>`;
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${g}</svg>`;
}
function chHbars(c){
  const W=940,H=340,pad=240,top=40,gap=46,maxV=Math.max(...c.bars.map(b=>b.value));
  const aw=W-pad-70; let g='';
  c.bars.forEach((b,i)=>{
    const y=top+i*gap*1.5, bw=Math.max(3,aw*(b.value/maxV));
    g+=`<g>
      <text x="${pad-16}" y="${y+22}" text-anchor="end" fill="var(--inkDim)" font-size="14" font-family="var(--fb)">${esc(b.label)}</text>
      <rect x="${pad}" y="${y}" width="${bw}" height="30" rx="5" fill="var(--${b.hue})"/>
      <text x="${pad+bw+12}" y="${y+22}" fill="var(--ink)" font-size="16" font-family="var(--fm)" font-weight="600">${nf(b.value)}</text>
    </g>`;
  });
  g+=`<g><text x="${W-60}" y="${top+18}" text-anchor="end" fill="var(--good)" font-family="var(--fh)" font-weight="700" font-size="72" opacity=".92">${esc(c.callout)}</text>
      <text x="${W-60}" y="${top+44}" text-anchor="end" fill="var(--inkDim)" font-size="13" font-family="var(--fm)">best vs HF</text></g>`;
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${g}</svg>`;
}
function chGauge(c){
  const cx=240,cy=205,r=150,W=480,H=360;
  const a0=135, a1=135+270*(c.value/c.max);
  const pol=(a)=>[cx+r*Math.cos(a*Math.PI/180), cy+r*Math.sin(a*Math.PI/180)];
  const arc=(s,e)=>{const[x1,y1]=pol(s),[x2,y2]=pol(e);const big=(e-s)>180?1:0;return `M ${x1} ${y1} A ${r} ${r} 0 ${big} 1 ${x2} ${y2}`;};
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
    <path d="${arc(135,405)}" fill="none" stroke="var(--grid)" stroke-width="22" stroke-linecap="round"/>
    <path d="${arc(a0,a1)}" fill="none" stroke="var(--pigrpo)" stroke-width="22" stroke-linecap="round"/>
    <text x="${cx}" y="${cy+6}" text-anchor="middle" fill="var(--ink)" font-family="var(--fh)" font-weight="700" font-size="82">${c.value}%</text>
    <text x="${cx}" y="${cy+38}" text-anchor="middle" fill="var(--inkDim)" font-family="var(--fm)" font-size="14" letter-spacing="1">${esc(c.label)}</text>
    <text x="${cx}" y="${cy+96}" text-anchor="middle" fill="var(--pigrpo)" font-family="var(--fh)" font-weight="600" font-size="18">${esc(c.sub||'')}</text>
  </svg>`;
}
function chDiverging(c){
  const W=940,H=340,mid=H/2-10,pad=300,zx=pad,aw=W-pad-90;
  const maxAbs=Math.max(...c.bars.map(b=>Math.abs(b.value)));
  let g=`<line x1="${zx}" y1="36" x2="${zx}" y2="${H-40}" stroke="var(--grid)"/>`;
  c.bars.forEach((b,i)=>{
    const y=70+i*120, bw=aw*(Math.abs(b.value)/maxAbs), up=b.value>=0;
    g+=`<g>
      <text x="${zx-16}" y="${y+22}" text-anchor="end" fill="var(--inkDim)" font-size="14" font-family="var(--fb)">${esc(b.label)}</text>
      <rect x="${up?zx:zx-bw}" y="${y}" width="${bw}" height="32" rx="5" fill="var(--${b.hue})"/>
      <text x="${up?zx+bw+12:zx-bw-12}" y="${y+23}" text-anchor="${up?'start':'end'}" fill="var(--ink)" font-size="16" font-family="var(--fm)" font-weight="600">${b.value>0?'+':''}${b.value}</text>
      <text x="${up?zx+bw+12:zx-bw-12}" y="${y+42}" text-anchor="${up?'start':'end'}" fill="var(--${b.hue})" font-size="12.5" font-family="var(--fm)">${esc(b.tag)}</text>
    </g>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${g}</svg>`;
}
function box(x,y,w,h,fill,stroke,label,sub,lc){
  return `<g><rect x="${x}" y="${y}" width="${w}" height="${h}" rx="10" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
   <text x="${x+w/2}" y="${y+h/2-6}" text-anchor="middle" fill="${lc||'var(--ink)'}" font-family="var(--fh)" font-weight="600" font-size="17">${esc(label)}</text>
   <text x="${x+w/2}" y="${y+h/2+16}" text-anchor="middle" fill="var(--inkDim)" font-family="var(--fm)" font-size="12.5">${esc(sub)}</text></g>`;
}
function chFork(){
  const W=940,H=360;
  let g=box(W/2-150,18,300,64,'var(--bgAlt)','var(--accent)','Physics encoded twice','objective term + validity metric','var(--accent)');
  g+=`<path d="M ${W/2} 82 C ${W/2} 130, ${230} 130, ${230} 168" stroke="var(--pcrf)" fill="none" stroke-width="2"/>`;
  g+=`<path d="M ${W/2} 82 C ${W/2} 130, ${710} 130, ${710} 168" stroke="var(--pigrpo)" fill="none" stroke-width="2"/>`;
  g+=box(80,168,300,58,'rgba(56,189,248,.08)','var(--pcrf)','PC-RF: compute-light step','bound by data-parallel throughput','var(--pcrf)');
  g+=box(560,168,300,58,'rgba(245,158,66,.08)','var(--pigrpo)','Pi-GRPO: rollout-bound step','MFU 4.7%, generation dominates','var(--pigrpo)');
  g+=box(80,266,300,58,'var(--bgAlt)','var(--grid)','Ray Train','data-parallel replicas','var(--pcrf)');
  g+=box(560,266,300,58,'var(--bgAlt)','var(--grid)','Ray actor-learner','vLLM rollouts -> FSDP learner','var(--pigrpo)');
  g+=`<path d="M 230 226 L 230 266" stroke="var(--pcrf)" fill="none" stroke-width="2" marker-end="url(#ar)"/>`;
  g+=`<path d="M 710 226 L 710 266" stroke="var(--pigrpo)" fill="none" stroke-width="2" marker-end="url(#ar)"/>`;
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet"><defs><marker id="ar" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto"><path d="M0,0 L6,4 L0,8 Z" fill="var(--inkDim)"/></marker></defs>${g}</svg>`;
}
function chTree(){
  const W=940,H=360;
  let g=box(W/2-160,16,320,56,'var(--bgAlt)','var(--accent)','Measure MFU of one training step','the load-bearing diagnostic','var(--accent)');
  g+=`<path d="M ${W/2} 72 C ${W/2} 116, ${250} 116, ${250} 150" stroke="var(--pcrf)" fill="none" stroke-width="2"/>`;
  g+=`<path d="M ${W/2} 72 C ${W/2} 116, ${690} 116, ${690} 150" stroke="var(--pigrpo)" fill="none" stroke-width="2"/>`;
  g+=`<text x="170" y="110" fill="var(--pcrf)" font-family="var(--fm)" font-size="12">compute-light</text>`;
  g+=`<text x="770" y="110" fill="var(--pigrpo)" font-family="var(--fm)" font-size="12" text-anchor="end">generation-bound</text>`;
  g+=box(90,150,320,56,'rgba(56,189,248,.08)','var(--pcrf)','Data-parallel replicas','Ray Train','var(--pcrf)');
  g+=box(530,150,320,56,'rgba(245,158,66,.08)','var(--pigrpo)','Disaggregate generation tier','vLLM rollouts + FSDP learner','var(--pigrpo)');
  g+=box(90,250,320,56,'var(--bgAlt)','var(--grid)','Serve: export + host-side sampler','ONNX net, ODE + projection on host','var(--pcrf)');
  g+=box(530,250,320,56,'var(--bgAlt)','var(--grid)','Serve: one rollout engine','content-addressed, auditable','var(--pigrpo)');
  g+=`<path d="M 250 206 L 250 250" stroke="var(--grid)" fill="none" stroke-width="2"/>`;
  g+=`<path d="M 690 206 L 690 250" stroke="var(--grid)" fill="none" stroke-width="2"/>`;
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${g}</svg>`;
}
function chTable(c){
  let h=`<table class="tbl"><thead><tr>`+c.head.map(x=>`<th>${esc(x)}</th>`).join('')+`</tr></thead><tbody>`;
  c.rows.forEach(r=>{h+='<tr>'+r.map(x=>`<td>${esc(x)}</td>`).join('')+'</tr>';});
  return h+'</tbody></table>';
}
function renderChart(ref){
  const c=CHARTS[ref]; if(!c) return '';
  if(c.kind==='table') return `<div class="chartWrap">${chTable(c)}</div>`;
  let svg='';
  if(c.kind==='smallmult')svg=chSmallmult(c);
  else if(c.kind==='hbars')svg=chHbars(c);
  else if(c.kind==='gauge')svg=chGauge(c);
  else if(c.kind==='diverging')svg=chDiverging(c);
  else if(c.kind==='fork')svg=chFork();
  else if(c.kind==='tree')svg=chTree();
  return `<div class="chartWrap">${svg}${c.caption?`<div class="cap">${esc(c.caption)}</div>`:''}</div>`;
}

/* ---------- slide assembly ---------- */
function block_body(s){return s.body&&s.body.length?`<ul class="body">${s.body.map(b=>`<li>${esc(b)}</li>`).join('')}</ul>`:'';}
function block_hl(s){return s.highlights&&s.highlights.length?`<div class="hl">${s.highlights.map(h=>`<div class="stat"><span class="v">${esc(h.value)}</span><span class="l">${esc(h.label)}</span></div>`).join('')}</div>`:'';}
function block_eq(s){return s.equations&&s.equations.length?`<div class="eqs">${s.equations.map(e=>`<div class="eq">${esc(e)}</div>`).join('')}</div>`:'';}
function block_fig(s){if(!s.figureRef)return'';const f=FIGURES[s.figureRef];if(!f)return'';return `<div class="figWrap"><img src="${f.src}" alt=""/><div class="cap">${esc(f.cap)}</div></div>`;}

function buildSlide(s,i,total){
  const sys=sysOf(s);
  const el=document.createElement('section');
  el.className='slide layout-'+s.layout; el.style.setProperty('--sys',sys);
  const kick=`<div class="kicker"><span class="dot"></span>${esc(s.kicker||s.section||'')}</div>`;
  const title=`<h1 class="title">${emph(s.title)}</h1><div class="titleRule"></div>`;
  let mid='';
  const L=s.layout;
  if(L==='title'){
    mid=`<div class="sub">${(s.body||[]).map(esc).join(' &middot; ')}</div>`+block_hl(s);
  } else if(L==='closing'){
    mid=block_body(s)+block_hl(s);
  } else if(L==='split'){
    const right = s.chartRef?renderChart(s.chartRef):(s.figureRef?block_fig(s):block_eq(s));
    mid=`<div class="split"><div class="col-l">${block_body(s)}</div><div class="col-r">${right}</div></div>`+block_hl(s);
  } else if(L==='chart'){
    mid=renderChart(s.chartRef)+block_hl(s);
  } else if(L==='figure'){
    mid=block_fig(s)+block_body(s);
  } else if(L==='equation'){
    mid=`<div class="split"><div class="col-l">${block_body(s)}</div><div class="col-r">${block_eq(s)||renderChart(s.chartRef)}</div></div>`;
  } else if(L==='bigstat'){
    mid=s.chartRef?('<div class="split"><div class="col-l">'+block_body(s)+'</div><div class="col-r">'+renderChart(s.chartRef)+'</div></div>'+block_hl(s)):(block_body(s)+block_hl(s));
  } else if(L==='takeaways'){
    mid=`<div class="tk">${(s.body||[]).map((b,k)=>`<div class="item"><div class="num">${k+1}</div><div class="txt">${esc(b)}</div></div>`).join('')}</div>`;
  } else if(L==='table'){
    if(s.chartRef) mid=renderChart(s.chartRef);
    else mid=`<div class="specgrid">${(s.body||[]).map(b=>{const p=b.split(/:\s(.+)/);return p.length>1?`<div class="row"><span class="k">${esc(p[0])}</span><span class="v">${esc(p[1])}</span></div>`:`<div class="row"><span class="v">${esc(b)}</span></div>`;}).join('')}</div>`+block_hl(s);
  } else { /* statement */
    mid=block_body(s)+block_eq(s)+block_hl(s);
  }
  const inProg=/in progress|not measured|diagnostic target/i.test((s.title||'')+JSON.stringify(s.body||''));
  const badge=(L==='statement'&&inProg)?'<span class="badge">honest scope</span>':'';
  el.innerHTML=kick+title+badge+mid+
    `<div class="foot"><span class="sec">${esc(s.section||'')}</span><span>${String(i+1).padStart(2,'0')} / ${total}</span></div>`;
  return el;
}

/* ---------- nav ---------- */
let idx=0; const total=SLIDES.length; const slideEls=[];
SLIDES.forEach((s,i)=>{const e=buildSlide(s,i,total);stage.appendChild(e);slideEls.push(e);});
const notesEl=document.getElementById('notes'),notesBody=document.getElementById('notesBody'),
      counter=document.getElementById('counter'),progress=document.getElementById('progress');
function show(n){
  idx=Math.max(0,Math.min(total-1,n));
  slideEls.forEach((e,i)=>e.classList.toggle('active',i===idx));
  counter.textContent=(idx+1)+' / '+total;
  progress.style.width=((idx+1)/total*100)+'%';
  notesBody.textContent=SLIDES[idx].notes||'';
  location.hash=idx+1;
}
function fit(){const sx=window.innerWidth/1280,sy=window.innerHeight/720;stage.style.transform='scale('+Math.min(sx,sy)+')';}
window.addEventListener('resize',fit);
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){show(idx+1);e.preventDefault();}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){show(idx-1);}
  else if(e.key==='Home'){show(0);} else if(e.key==='End'){show(total-1);}
  else if(e.key==='n'||e.key==='N'||e.key==='s'||e.key==='S'){notesEl.classList.toggle('show');}
  else if(e.key==='f'||e.key==='F'){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
  else if(e.key==='p'||e.key==='P'){window.print();}
});
let swiped=false;
stage.addEventListener('click',e=>{ if(swiped){swiped=false;return;} show(idx + (e.clientX > window.innerWidth/2 ? 1 : -1)); });
// touch swipe (horizontal only, so vertical scroll of notes still works)
let _tx=0,_ty=0;
stage.addEventListener('touchstart',e=>{const t=e.changedTouches[0];_tx=t.clientX;_ty=t.clientY;},{passive:true});
stage.addEventListener('touchend',e=>{const t=e.changedTouches[0],dx=t.clientX-_tx,dy=t.clientY-_ty;
  if(Math.abs(dx)>45 && Math.abs(dx)>Math.abs(dy)*1.4){swiped=true;show(idx+(dx<0?1:-1));setTimeout(()=>{swiped=false;},450);}},{passive:true});
// on-screen nav arrows (shown on touch / small screens via CSS)
['prev','next'].forEach(d=>{const b=document.createElement('div');b.className='navbtn';b.id=d+'Btn';
  b.textContent=d==='prev'?'‹':'›';
  b.addEventListener('click',e=>{e.stopPropagation();show(idx+(d==='next'?1:-1));});document.body.appendChild(b);});
// rotate-to-landscape hint (portrait phones only)
let hintDismissed=false;
const rh=document.getElementById('rotateHint');
document.getElementById('rhDismiss').addEventListener('click',()=>{hintDismissed=true;rh.style.display='none';});
function checkOrient(){const portrait=window.innerHeight>window.innerWidth,
  small=Math.min(window.innerWidth,window.innerHeight)<560;
  rh.style.display=(portrait&&small&&!hintDismissed)?'flex':'none';}
window.addEventListener('resize',checkOrient);
window.addEventListener('orientationchange',()=>setTimeout(()=>{fit();checkOrient();},150));
fit(); checkOrient(); show(parseInt(location.hash.slice(1))-1||0);
</script>
</body></html>
